[tool.poetry]
name = "tajana"
version = "0.1.0"
description = "Financial analysis and backtesting framework - optimized"
authors = ["Your Name <you@example.com>"]
license = "MIT"
readme = "README.md"
packages = [
    { include = "data_pipelines" },
    { include = "src" }
]

[tool.poetry.dependencies]
python = ">=3.10,<3.13"

# Core dependencies - always loaded
pandas = "<2.0.0"
numpy = "<2.0.0"
pyyaml = "^6.0.1"
click = "^8.1.0"
tqdm = "^4.65.0"
loguru = "^0.7.0"
requests = "^2.32.3"

# Data providers - conditionally loaded
yfinance = {version = "^0.2.41", optional = true}
xbbg = {version = "^0.7.7", optional = true}
pdblp = {version = "^0.1.8", optional = true}
fredapi = {version = "^0.5.2", optional = true}

# Analysis libraries - lazy loaded
scipy = {version = "^1.11.0", optional = true}
scikit-learn = {version = "^1.6.1", optional = true}
arch = {version = "^7.2.0", optional = true}

# ML libraries - heavy, loaded on demand
lightgbm = {version = "^4.5.0", optional = true}
xgboost = {version = "^2.1.3", optional = true}
catboost = {version = "^1.2.7", optional = true}
torch = {version = "^2.5.1", optional = true}

# Optimization libraries - loaded on demand  
optuna = {version = "^4.1.0", optional = true}
flaml = {version = "^2.3.3", optional = true}
autots = {version = "^0.6.17", optional = true}
scikit-optimize = {version = "^0.9.0", optional = true}
deap = {version = "^1.4.2", optional = true}

# Feature engineering - loaded on demand
tsfresh = {version = "^0.21.0", optional = true}
ruptures = {version = "^1.1.9", optional = true}
filterpy = {version = "^1.4.5", optional = true}
hmmlearn = {version = "^0.3.0", optional = true}

# Visualization - heavy, loaded on demand
plotly = {version = "^5.23.0", optional = true}
matplotlib = {version = "^3.10.1", optional = true}
seaborn = {version = "^0.13.2", optional = true}
dash = {version = "^2.17.1", optional = true}
dash-bootstrap-components = {version = "^1.6.0", optional = true}

# Notebook/reporting - loaded on demand
jupyter = {version = "^1.1.1", optional = true}
notebook = {version = "^7.2.2", optional = true}
nbformat = {version = "^5.10.4", optional = true}
nbconvert = {extras = ["webpdf"], version = "^7.16.4", optional = true}
ipykernel = {version = "^6.29.5", optional = true}
ipywidgets = {version = "^8.1.5", optional = true}
papermill = {version = "^2.6.0", optional = true}

# Analysis extensions - loaded on demand
vectorbt = {version = "^0.26.2", optional = true}
quantstats = {version = "^0.0.62", optional = true}
shap = {version = "^0.47.2", optional = true}

# Utilities - lightweight
openpyxl = "^3.1.5"
jinja2 = "^3.1.4"
setuptools = "^73.0.1"
sqlalchemy = "^2.0.25"

[tool.poetry.extras]
# Feature groups for selective installation
bloomberg = ["xbbg", "pdblp"]
ml = ["lightgbm", "xgboost", "catboost", "torch"]
optimization = ["optuna", "flaml", "autots", "scikit-optimize", "deap"]
analysis = ["scipy", "scikit-learn", "arch", "vectorbt", "quantstats"]
visualization = ["plotly", "matplotlib", "seaborn", "dash", "dash-bootstrap-components"]
notebooks = ["jupyter", "notebook", "nbformat", "nbconvert", "ipykernel", "ipywidgets", "papermill"]
features = ["tsfresh", "ruptures", "filterpy", "hmmlearn"]
data = ["yfinance", "fredapi"]
all = [
    "xbbg", "pdblp", "yfinance", "fredapi",
    "lightgbm", "xgboost", "catboost", "torch", 
    "optuna", "flaml", "autots", "scikit-optimize", "deap",
    "scipy", "scikit-learn", "arch", "vectorbt", "quantstats",
    "plotly", "matplotlib", "seaborn", "dash", "dash-bootstrap-components",
    "jupyter", "notebook", "nbformat", "nbconvert", "ipykernel", "ipywidgets", "papermill",
    "tsfresh", "ruptures", "filterpy", "hmmlearn"
]

[tool.poetry.group.dev.dependencies]
pytest = "^7.4.0"
pytest-cov = "^4.1.0"
black = "^23.7.0"
isort = "^5.12.0"
flake8 = "^6.0.0"
mypy = "^1.5.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

# Performance optimization markers
[tool.performance]
lazy_imports = [
    "torch", "lightgbm", "xgboost", "catboost", 
    "plotly", "matplotlib", "seaborn", "dash",
    "optuna", "flaml", "tsfresh", "vectorbt"
]
startup_critical = ["pandas", "numpy", "pyyaml", "click", "loguru"]
memory_heavy = ["torch", "dash", "jupyter", "tsfresh"]